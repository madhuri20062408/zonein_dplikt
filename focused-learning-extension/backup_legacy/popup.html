<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    
    <!-- ── AUTH SCREEN (Simplified) ─────────────────────────────── -->
    <div id="authScreen" class="screen hidden">
      <div class="logo-container">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <h1>ZoneIn</h1>
      <p>Log in to your account to start tracking your learning progress.</p>
      
      <button id="webLoginBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        Sign In on Website
      </button>
    </div>

    <!-- ── APP SCREEN ─────────────────────────────────────────── -->
    <div id="appScreen" class="screen hidden">
      <header>
        <h1>ZoneIn</h1>
        <label class="switch">
          <input type="checkbox" id="focusToggle">
          <span class="slider round"></span>
        </label>
      </header>

      <div id="focusWarning" class="focus-warning hidden">Focus Mode is OFF</div>

      <main>
        <div class="stat-card">
          <span class="label">Blocked</span>
          <span id="blockedCount" class="value">0</span>
        </div>
        <div class="stat-card">
          <span class="label">Watch Time</span>
          <span id="watchTime" class="value">0m</span>
        </div>
      </main>

      <footer>
        <button id="dashboardBtn" class="btn-primary">View Dashboard</button>
        <button id="logoutBtn" class="btn-ghost">Sign Out</button>
      </footer>
    </div>

  </div>

  <script src="api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
